<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại Chiến Lịch Sử - Full Questions</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e67e22;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #ecf0f1;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #000000);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        
        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-weight: bold;
        }

        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-easy { background: var(--success); }
        .btn-med { background: var(--secondary); }
        .btn-hard { background: var(--danger); }

        .hidden { display: none; }

        .question { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.4; }

        .option {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .option:hover { background: white; transform: scale(1.02); }
        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }

        #music-control { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; }
        #score-board { color: var(--gold); font-size: 1.2rem; margin-top: 15px; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<div id="game-container">
    <div id="music-control" onclick="toggleMusic()">🔊</div>

    <div id="start-screen">
        <h1>Sử Việt & Thế Giới</h1>
        <p>Chọn cấp độ để thử thách kiến thức của bạn:</p>
        <button class="menu-btn btn-easy" onclick="startGame('easy')">DỄ (10 câu)</button>
        <button class="menu-btn btn-med" onclick="startGame('medium')">TRUNG BÌNH (10 câu)</button>
        <button class="menu-btn btn-hard" onclick="startGame('hard')">KHÓ (10 câu)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress" style="margin-bottom: 10px;">Câu hỏi: <span id="current-idx">1</span>/10</div>
        <div class="question" id="question-text"></div>
        <div id="options-container"></div>
        <div id="score-board">Điểm: <span id="score">0</span></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-title">KẾT QUẢ</h2>
        <p id="final-msg" style="font-size: 1.2rem;"></p>
        <h1 id="final-score" style="font-size: 3rem;">0</h1>
        <button class="menu-btn" style="background: var(--primary)" onclick="location.reload()">CHƠI LẠI</button>
    </div>
</div>

<script>
    const questions = {
        easy: [
            { q: "Vua nào đại phá quân Thanh vào mùa xuân năm Kỷ Dậu 1789?", a: ["Nguyễn Huệ", "Gia Long", "Lê Lợi", "Minh Mạng"], c: 0 },
            { q: "Thủ đô của nước Việt Nam hiện nay là gì?", a: ["TP. Hồ Chí Minh", "Huế", "Hà Nội", "Đà Nẵng"], c: 2 },
            { q: "Người đầu tiên đặt chân lên Mặt Trăng là ai?", a: ["Yuri Gagarin", "Neil Armstrong", "Elon Musk", "Buzz Aldrin"], c: 1 },
            { q: "Ai là người cắm cờ trên dinh Độc Lập ngày 30/4/1975?", a: ["Bùi Quang Thận", "Võ Nguyên Giáp", "Hồ Chí Minh", "Lê Duẩn"], c: 0 },
            { q: "Bác Hồ đọc bản Tuyên ngôn Độc lập tại đâu?", a: ["Bến Nhà Rồng", "Quảng trường Ba Đình", "Pác Bó", "Tân Trào"], c: 1 },
            { q: "Quốc gia nào có diện tích lớn nhất thế giới?", a: ["Mỹ", "Trung Quốc", "Nga", "Canada"], c: 2 },
            { q: "Ai là tác giả của 'Truyện Kiều'?", a: ["Nguyễn Trãi", "Nguyễn Du", "Chu Văn An", "Hồ Xuân Hương"], c: 1 },
            { q: "Lễ hội Đền Hùng được tổ chức ở tỉnh nào?", a: ["Phú Thọ", "Vĩnh Phúc", "Bắc Ninh", "Hà Tây"], c: 0 },
            { q: "Kênh đào Suez nối liền hai biển nào?", a: ["Biển Đen và Biển Đỏ", "Địa Trung Hải và Biển Đỏ", "Đại Tây Dương và Thái Bình Dương", "Biển Đông và Biển Nhật Bản"], c: 1 },
            { q: "Vị vua cuối cùng của Việt Nam là ai?", a: ["Bảo Đại", "Duy Tân", "Khải Định", "Hàm Nghi"], c: 0 }
        ],
        medium: [
            { q: "Nhà Trần đã mấy lần đại thắng quân Nguyên Mông?", a: ["1 lần", "2 lần", "3 lần", "4 lần"], c: 2 },
            { q: "Chiến tranh thế giới thứ nhất bắt đầu vào năm nào?", a: ["1914", "1918", "1939", "1945"], c: 0 },
            { q: "Ai được mệnh danh là 'Trạng Trình'?", a: ["Nguyễn Hiền", "Lương Thế Vinh", "Nguyễn Bỉnh Khiêm", "Mạc Đĩnh Chi"], c: 2 },
            { q: "Nữ vương đầu tiên trong lịch sử Việt Nam là ai?", a: ["Ngô Quyền", "Trưng Trắc", "Lý Chiêu Hoàng", "Dương Vân Nga"], c: 1 },
            { q: "Tổ chức Liên Hợp Quốc (UN) thành lập năm nào?", a: ["1944", "1945", "1946", "1950"], c: 1 },
            { q: "Trận Bạch Đằng năm 938 do ai lãnh đạo?", a: ["Ngô Quyền", "Lê Hoàn", "Trần Hưng Đạo", "Lý Thường Kiệt"], c: 0 },
            { q: "Cuộc cách mạng công nghiệp đầu tiên bắt đầu từ quốc gia nào?", a: ["Pháp", "Mỹ", "Đức", "Anh"], c: 3 },
            { q: "Thành phố nào từng được mệnh danh là 'Hòn ngọc Viễn Đông'?", a: ["Bangkok", "Sài Gòn", "Singapore", "Hong Kong"], c: 1 },
            { q: "Vị tướng nào lãnh đạo chiến thắng Điện Biên Phủ?", a: ["Văn Tiến Dũng", "Phạm Văn Đồng", "Võ Nguyên Giáp", "Nguyễn Chí Thanh"], c: 2 },
            { q: "Ai là người khởi xướng phong trào Đông Du?", a: ["Phan Bội Châu", "Phan Châu Trinh", "Nguyễn Thái Học", "Lương Ngọc Quyến"], c: 0 }
        ],
        hard: [
            { q: "Bản hiến pháp đầu tiên của nước Việt Nam Dân chủ Cộng hòa được thông qua năm nào?", a: ["1945", "1946", "1954", "1959"], c: 1 },
            { q: "Hiệp ước nào đánh dấu sự kết thúc của Chiến tranh Ba mươi năm ở Châu Âu?", a: ["Hiệp ước Versailles", "Hiệp ước Westphalia", "Hiệp ước Utrecht", "Hiệp ước Paris"], c: 1 },
            { q: "Triều đại nào trong lịch sử Việt Nam đã đổi tên nước thành Đại Ngu?", a: ["Nhà Lê", "Nhà Hồ", "Nhà Mạc", "Nhà Tây Sơn"], c: 1 },
            { q: "Trận đánh nào được coi là bước ngoặt quan trọng nhất tại mặt trận Xô-Đức trong Thế chiến II?", a: ["Trận Berlin", "Trận Stalingrad", "Trận Kursk", "Trận Moscow"], c: 1 },
            { q: "Ai là người viết 'Lý Thường Kiệt lịch sử ngoại giao và tông giáo triều Lý'?", a: ["Trần Trọng Kim", "Hoàng Xuân Hãn", "Đào Duy Anh", "Phạm Huy Thông"], c: 1 },
            { q: "Quốc gia nào là chủ nhà của hội nghị Yalta 1945?", a: ["Mỹ", "Anh", "Liên Xô", "Pháp"], c: 2 },
            { q: "Vị vua nào của nhà Lý đã dời đô từ Hoa Lư về Thăng Long?", a: ["Lý Thái Tổ", "Lý Thái Tông", "Lý Thánh Tông", "Lý Nhân Tông"], c: 0 },
            { q: "Hội nghị Diên Hồng do vua nào tổ chức để hỏi ý kiến các bô lão về việc đánh giặc?", a: ["Trần Thái Tông", "Trần Thánh Tông", "Trần Nhân Tông", "Trần Anh Tông"], c: 2 },
            { q: "Dòng họ nào đã nắm quyền thực tế (Chúa) ở Đàng Trong?", a: ["Họ Trịnh", "Họ Mạc", "Họ Nguyễn", "Họ Vũ"], c: 2 },
            { q: "Cuộc cải cách của ai vào cuối thế kỷ XIV đã dẫn đến sự sụp đổ của nhà Trần?", a: ["Hồ Quý Ly", "Trần Thủ Độ", "Lê Quý Đôn", "Nguyễn Nhữ Lãm"], c: 0 }
        ]
    };

    let currentLevelData = [];
    let currentIdx = 0;
    let score = 0;
    let canClick = true;

    function startGame(level) {
        document.getElementById('bg-music').play().catch(() => {});
        currentLevelData = questions[level];
        currentIdx = 0;
        score = 0;
        document.getElementById('score').innerText = "0";
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        canClick = true;
        const qData = currentLevelData[currentIdx];
        document.getElementById('current-idx').innerText = currentIdx + 1;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        qData.a.forEach((opt, index) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }
